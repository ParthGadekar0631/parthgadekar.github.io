<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Parth Gadekar's software engineer portfolio, featuring a modular product-style experience, dynamic project storytelling, and a multi-page personal site."
    />
    <meta name="application-name" content="Parth Gadekar Portfolio" />
    <meta name="theme-color" content="#040611" />
    <meta property="og:title" content="Parth Gadekar | Software Engineer Portfolio" />
    <meta
      property="og:description"
      content="A modular software engineering portfolio with route-based storytelling, dynamic visuals, and detailed project pages."
    />
    <script>
      (function () {
        var location = window.location;
        if (!location.search || location.search.length < 2 || location.search[1] !== "/") {
          return;
        }

        var decoded = location.search
          .slice(1)
          .split("&")
          .map(function (segment) {
            return segment.replace(/~and~/g, "&");
          })
          .join("?");

        window.history.replaceState(null, "", location.pathname.slice(0, -1) + decoded + location.hash);
      })();
    </script>
    <title>Parth Gadekar | Software Engineer Portfolio</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
  </html>
